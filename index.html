<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Calculator</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0a0a0f; font-family: 'Syne', sans-serif; min-height: 100vh; color: #f0ede8; }
      .app { min-height: 100vh; padding: 24px 16px 48px; background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,200,60,0.07) 0%, transparent 60%), radial-gradient(ellipse 40% 50% at 80% 80%, rgba(0,200,120,0.06) 0%, transparent 60%); }
      .header { text-align: center; margin-bottom: 40px; }
      .header-badge { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #ffc83d; background: rgba(255,200,61,0.1); border: 1px solid rgba(255,200,61,0.25); padding: 5px 14px; border-radius: 100px; margin-bottom: 16px; text-transform: uppercase; }
      h1 { font-size: clamp(28px, 6vw, 42px); font-weight: 800; line-height: 1.1; }
      h1 span { color: #ffc83d; }
      .grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 680px; margin: 0 auto; }
      @media (min-width: 640px) { .grid { grid-template-columns: 1fr 1fr; } }
      .card { background: #111118; border: 1px solid #1e1e2e; border-radius: 20px; padding: 28px 24px; position: relative; overflow: hidden; }
      .card-margin::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #ffc83d, #ff9500); }
      .card-price::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #00c878, #00a0f0); }
      .card-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; color: #e8e5e0; }
      label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #555; margin-bottom: 8px; text-transform: uppercase; }
      .input-wrap { position: relative; margin-bottom: 14px; }
      .input-prefix { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-family: 'JetBrains Mono', monospace; color: #444; }
      input { width: 100%; background: #0d0d14; border: 1px solid #222230; border-radius: 12px; padding: 13px 14px 13px 32px; color: #e8e5e0; font-family: 'JetBrains Mono', monospace; outline: none; }
      .result-box { margin-top: 22px; border-radius: 14px; padding: 20px; text-align: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
      .result-value { font-size: 32px; font-weight: 800; color: #ffc83d; }
      .card-price .result-value { color: #00c878; }
      .profit-pill { display: inline-block; margin-top: 10px; padding: 4px 12px; border-radius: 100px; font-size: 12px; background: rgba(0,200,120,0.1); color: #00c878; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function MarginCalculator() {
            const [cost, setCost] = useState("");
            const [sell, setSell] = useState("");
            const [margin, setMargin] = useState(null);

            useEffect(() => {
                const cp = parseFloat(cost);
                const sp = parseFloat(sell);
                if (cp >= 0 && sp > 0) setMargin(((sp - cp) / sp) * 100);
                else setMargin(null);
            }, [cost, sell]);

            return (
                <div className="card card-margin">
                    <div className="card-title">Calculate Margin %</div>
                    <label>Cost Price</label>
                    <div className="input-wrap"><span className="input-prefix">$</span>
                        <input type="number" value={cost} onChange={e => setCost(e.target.value)} placeholder="0.00" />
                    </div>
                    <label>Selling Price</label>
                    <div className="input-wrap"><span className="input-prefix">$</span>
                        <input type="number" value={sell} onChange={e => setSell(e.target.value)} placeholder="0.00" />
                    </div>
                    <div className="result-box">
                        <div style={{fontSize: '10px', textTransform: 'uppercase', color: '#555'}}>Margin</div>
                        <div className="result-value">{margin !== null ? margin.toFixed(2) + '%' : '—'}</div>
                    </div>
                </div>
            );
        }

        function PriceCalculator() {
            const [cost, setCost] = useState("");
            const [desired, setDesired] = useState("");
            const [price, setPrice] = useState(null);

            useEffect(() => {
                const cp = parseFloat(cost);
                const dm = parseFloat(desired);
                if (cp >= 0 && dm < 100) setPrice(cp / (1 - dm / 100));
                else setPrice(null);
            }, [cost, desired]);

            return (
                <div className="card card-price">
                    <div className="card-title">Calculate Sell Price</div>
                    <label>Cost Price</label>
                    <div className="input-wrap"><span className="input-prefix">$</span>
                        <input type="number" value={cost} onChange={e => setCost(e.target.value)} placeholder="0.00" />
                    </div>
                    <label>Desired Margin %</label>
                    <div className="input-wrap"><span className="input-prefix">%</span>
                        <input type="number" value={desired} onChange={e => setDesired(e.target.value)} placeholder="0" />
                    </div>
                    <div className="result-box">
                        <div style={{fontSize: '10px', textTransform: 'uppercase', color: '#555'}}>Recommended Price</div>
                        <div className="result-value">{price !== null ? '$' + price.toFixed(2) : '—'}</div>
                    </div>
                </div>
            );
        }

        function App() {
            return (
                <div className="app">
                    <div className="header">
                        <div className="header-badge">Retail Tools</div>
                        <h1>Margin <span>Calculator</span></h1>
                    </div>
                    <div className="grid">
                        <MarginCalculator />
                        <PriceCalculator />
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
